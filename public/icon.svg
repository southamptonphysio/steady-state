<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Background: teal rounded square -->
  <rect width="192" height="192" rx="42" fill="#2A8A84"/>
  <!-- Dampening wave settling to baseline.
       Three arcs of decreasing amplitude (52px → 32px → 18px),
       then flat — representing a signal finding equilibrium. -->
  <path d="M 20,96
           C 28,40 52,40 62,96
           C 72,136 96,136 106,96
           C 116,72 136,72 146,96
           L 172,96"
        stroke="white" stroke-width="9" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
